<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>...</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>
<body>

<img src="Annotation 2026-07-02 033105.png" alt="">

<audio id="audio" autoplay>
  <source src="the-fog-is-coming.mp3" type="audio/mpeg">
</audio>

<script>
window.addEventListener("load", () => {
  const audio = document.getElementById("audio");
  audio.play().catch(() => {
    console.log("Autoplay was blocked.");
  });

  if (document.documentElement.requestFullscreen) {
    document.documentElement.requestFullscreen().catch(() => {});
  }
});
</script>

</body>
</html>
